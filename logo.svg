<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#logoShadow)" />
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5" />
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  
  <!-- Mountain/Arrow upward symbol -->
  <g transform="translate(100, 100)">
    <!-- Left peak -->
    <path d="M -20 15 L -5 -10 L 0 5 Z" fill="#D4AF37" opacity="0.9" />
    
    <!-- Right peak -->
    <path d="M 0 5 L 15 -15 L 25 10 Z" fill="#D4AF37" opacity="0.7" />
    
    <!-- Central rising line -->
    <path d="M -25 20 Q 0 -20 25 15" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" />
    
    <!-- Base line representing stability -->
    <line x1="-30" y1="25" x2="30" y2="25" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  </g>
  
  <!-- Text (optional - can be added via separate markup) -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D4AF37" text-anchor="middle" opacity="0.8">VANTAGEFLOW</text>
</svg>
