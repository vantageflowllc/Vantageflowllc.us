<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="url(#faviconGradient)" rx="8" />
  
  <!-- Outer border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#D4AF37" stroke-width="1.5" rx="6" />
  
  <!-- Arrow/Mountain symbol -->
  <g transform="translate(32, 32)">
    <!-- Left peak -->
    <path d="M -10 8 L -2 -5 L 0 2 Z" fill="#D4AF37" />
    
    <!-- Right peak -->
    <path d="M 0 2 L 8 -8 L 14 6 Z" fill="#D4AF37" opacity="0.8" />
    
    <!-- Central line -->
    <path d="M -15 12 Q 0 -12 15 8" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
